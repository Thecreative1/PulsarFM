  <style>
    :root {
      --bg-base: #031317;
      --bg-panel: rgba(0, 10, 14, 0.78);
      --bg-card: rgba(0, 0, 0, 0.72);
      --line-primary: #00ffcc;
      --line-secondary: #00ccff;
      --line-secondary-strong: #1ed9ff;
      --neon-pink: #ff2d9b;
      --neon-pink-soft: rgba(255, 45, 155, 0.22);
      --neon-purple: #c044ff;
      --neon-purple-soft: rgba(192, 68, 255, 0.18);
      --text-primary: #ecfffb;
      --text-muted: #9ad9d3;
      --text-dim: rgba(236, 255, 251, 0.72);
      --shadow-glow: 0 0 25px rgba(0, 255, 204, 0.22);
      --shadow-glow-pink: 0 0 28px rgba(255, 45, 155, 0.28);
      --neon-green: #39ff14;
      --neon-green-soft: rgba(57, 255, 20, 0.18);
      --shadow-card: 0 0 16px rgba(0, 204, 255, 0.18);
      --radius-panel: 24px;
      --radius-card: 16px;
      --stack-height: 80px;
    }

    html {
      color-scheme: dark;
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      margin: 0;
      padding: 8px 16px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      background:
        radial-gradient(circle at top left,  rgba(192, 68, 255, 0.13), transparent 40%),
        radial-gradient(circle at top right, rgba(255, 45, 155, 0.10), transparent 38%),
        radial-gradient(circle at top,       rgba(0, 255, 204, 0.09), transparent 34%),
        radial-gradient(circle at bottom,    rgba(0, 153, 255, 0.12), transparent 30%),
        linear-gradient(180deg, #02080b 0%, #031317 48%, #010507 100%);
      color: var(--text-primary);
      font-family: Arial, sans-serif;
    }

    a { color: var(--line-secondary); }
    a:hover { color: var(--line-primary); }

    button { font: inherit; }

    button:focus-visible,
    a:focus-visible {
      outline: 2px solid var(--line-primary);
      outline-offset: 3px;
    }

    #winamp {
      width: 100%;
      min-height: var(--stack-height);
      display: flex;
      justify-content: center;
      pointer-events: none;
    }

    #winamp > div {
      position: fixed !important;
      top: 6px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      pointer-events: auto;
    }

    #container {
      position: relative;
      width: min(1200px, calc(100% - 16px));
      background-color: var(--bg-panel);
      border: 2px solid var(--line-primary);
      border-radius: var(--radius-panel);
      padding: 36px 24px;
      box-sizing: border-box;
      box-shadow:
        var(--shadow-glow),
        var(--shadow-glow-pink),
        0 0 50px rgba(0, 255, 204, 0.10),
        0 0 80px rgba(192, 68, 255, 0.08),
        inset 0 0 8px rgba(0, 34, 34, 0.6);
      backdrop-filter: blur(8px);
      margin-top: -8px;
    }

    .hero {
      text-align: center;
      margin-bottom: 18px;
      padding-top: 32px;
    }

    .hero-logo {
      max-width: 200px;
      width: min(60%, 200px);
      margin: 0 auto 8px;
      display: block;
      filter:
        drop-shadow(0 0 14px rgba(0, 255, 204, 0.55))
        drop-shadow(0 0 28px rgba(255, 45, 155, 0.30))
        drop-shadow(0 0 42px rgba(192, 68, 255, 0.18));
    }

    .eyebrow {
      margin: 0 0 6px;
      color: var(--line-primary);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.8rem;
    }

    h1 {
      margin: 0;
      color: var(--line-primary);
      font-size: clamp(2rem, 4vw, 3rem);
      text-shadow:
        0 0 18px rgba(0, 255, 204, 0.35),
        0 0 40px rgba(255, 45, 155, 0.20),
        0 0 60px rgba(192, 68, 255, 0.14);
    }

    .intro {
      max-width: 820px;
      margin: 8px auto 6px;
      color: var(--text-muted);
      line-height: 1.7;
      font-size: 1rem;
    }


    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    .filter-btn {
      background-color: var(--line-secondary);
      color: #001114;
      border: 0;
      padding: 10px 16px;
      border-radius: 999px;
      font-weight: bold;
      cursor: pointer;
      white-space: nowrap;
      transition: transform 0.14s ease, background-color 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 0 0 rgba(0, 204, 255, 0);
    }

    .filter-btn:hover {
      background-color: var(--neon-pink);
      color: #1a0010;
      transform: translateY(-2px);
      box-shadow: 0 0 14px rgba(255, 45, 155, 0.5), 0 0 28px rgba(255, 45, 155, 0.25);
    }

    .filter-btn.active {
      background: var(--neon-green);
      color: #001a00;
      box-shadow: 0 0 16px rgba(57, 255, 20, 0.5), 0 0 32px rgba(57, 255, 20, 0.25);
    }


    .seo-blocks {
      display: grid;
      gap: 12px;
      margin: 32px 0 8px;
      opacity: 0.55;
      transition: opacity 0.3s ease;
    }

    .seo-blocks:hover { opacity: 0.85; }

    .seo-card {
      background: transparent;
      border: 1px solid rgba(0, 255, 204, 0.08);
      border-radius: 14px;
      padding: 16px 18px;
    }

    .seo-card h2 {
      margin: 0 0 6px;
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .seo-card p {
      margin: 0;
      color: var(--text-dim);
      line-height: 1.6;
      font-size: 0.88rem;
    }

    .seo-card strong { color: var(--text-muted); }

    .genre-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .genre-filter-link {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      text-decoration: none;
      background: rgba(0, 204, 255, 0.12);
      border: 1px solid rgba(0, 204, 255, 0.25);
      color: var(--line-secondary);
      transition: all 0.2s ease;
    }

    .genre-filter-link:hover {
      background: var(--neon-pink-soft);
      border-color: rgba(255, 45, 155, 0.5);
      color: var(--neon-pink);
      transform: translateY(-2px);
      box-shadow: 0 0 12px rgba(255, 45, 155, 0.35);
      text-shadow: 0 0 8px rgba(255, 45, 155, 0.6);
    }

    .genre-columns {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }

    .radio-group {
      background-color: rgba(0, 0, 0, 0.18);
      border: 1px solid rgba(0, 255, 204, 0.12);
      border-radius: 18px;
      padding: 18px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
    }

    .radio-group .station-list {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .radio-group[hidden] { display: none; }

    .group-heading {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      margin: 0 0 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(0, 255, 204, 0.12);
    }

    .radio-group h2 {
      margin: 0;
      color: var(--line-primary);
      font-size: 1.25rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

.station-list { display: grid; gap: 14px; }

    .radio-card {
      background-color: var(--bg-card);
      border: 1px solid var(--line-secondary);
      border-radius: var(--radius-card);
      padding: 16px;
      flex: 1;
      box-shadow: var(--shadow-card), inset 0 0 6px rgba(0, 34, 51, 0.55);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: transform 0.18s ease, border-color 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
    }

    .radio-card:hover {
      transform: translateY(-2px);
      background-color: rgba(10, 18, 22, 0.92);
      border-color: var(--neon-pink);
      box-shadow:
        0 0 18px rgba(255, 45, 155, 0.30),
        0 0 36px rgba(192, 68, 255, 0.16),
        inset 0 0 6px rgba(0, 34, 51, 0.65);
    }

    .radio-card.playing {
      background: linear-gradient(160deg, rgba(57, 255, 20, 0.10), rgba(57, 255, 20, 0.05));
      border-color: var(--neon-green);
      box-shadow:
        0 0 16px rgba(57, 255, 20, 0.40),
        0 0 36px rgba(57, 255, 20, 0.18),
        inset 0 0 10px rgba(57, 255, 20, 0.06);
    }

    .radio-card.playing h3 {
      color: var(--neon-green);
      text-shadow: 0 0 10px rgba(57, 255, 20, 0.55);
    }

    .radio-card.playing .play-button {
      background: var(--neon-green);
      color: #001a00;
      box-shadow: 0 0 12px rgba(57, 255, 20, 0.5);
    }

    .radio-card h3 {
      margin: 0 0 12px;
      color: var(--line-secondary);
      font-size: 1.08rem;
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .play-button {
      align-self: flex-start;
      background-color: var(--line-secondary);
      color: #001114;
      border: 0;
      padding: 9px 16px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: bold;
      transition: background-color 0.2s ease, transform 0.14s ease, opacity 0.2s ease;
    }

    .play-button:hover:enabled {
      background-color: var(--line-secondary-strong);
      transform: translateY(-1px);
    }

    .play-button:disabled {
      cursor: wait;
      opacity: 0.62;
    }

    .scan-btn, .lang-switcher {
      position: absolute;
      top: 16px;
      background: transparent;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: bold;
      letter-spacing: 0.1em;
      cursor: pointer;
      padding: 6px 14px;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .scan-btn {
      left: 20px;
      border: 1px solid rgba(57, 255, 20, 0.35);
      color: var(--neon-green);
      transition: border-color 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }

    .scan-btn:hover:not(:disabled) {
      border-color: var(--neon-green);
      box-shadow: 0 0 10px rgba(57, 255, 20, 0.4);
    }

    .scan-btn:active:not(:disabled) { transform: scale(0.95); }

    .scan-btn:disabled {
      opacity: 0.35;
      cursor: wait;
    }

    .lang-switcher {
      right: 20px;
      border: 1px solid rgba(0, 255, 204, 0.35);
      color: var(--line-primary);
      transition: border-color 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
    }

    .lang-switcher:hover {
      border-color: var(--neon-green);
      color: var(--neon-green);
      box-shadow: 0 0 10px rgba(57, 255, 20, 0.3);
    }

    .site-footer {
      margin-top: 20px;
      text-align: center;
      font-size: 0.92rem;
      color: rgba(0, 255, 204, 0.7);
      text-shadow: 0 0 10px rgba(255, 45, 155, 0.20);
    }

    .site-footer p {
      margin: 0;
      line-height: 1.7;
    }

    @media (max-width: 820px) {
      :root { --stack-height: 250px; }

      #winamp > div {
        top: 4px;
        transform: translateX(-50%) scale(0.82);
        transform-origin: top center;
      }

      #container {
        padding: 28px 18px;
        margin-top: -6px;
      }

      .genre-columns {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 560px) {
      :root { --stack-height: 260px; }

      body {
        padding-inline: 8px;
        overflow-x: hidden;
      }

      #winamp > div {
        top: 2px;
        transform: translateX(-50%) scale(0.66);
      }

      #container {
        margin-top: -4px;
        padding: 12px 14px 18px;
        border-radius: 18px;
        overflow-x: hidden;
      }

      .hero {
        margin-bottom: 16px;
        padding-top: 36px;
      }

      .hero-logo {
        width: min(60%, 200px);
        margin-bottom: 8px;
      }

      h1 { font-size: 1.5rem; }

      .intro {
        font-size: 0.9rem;
        margin: 8px auto 6px;
      }

      .filter-bar {
        flex-wrap: nowrap;
        overflow-x: auto;
        justify-content: flex-start;
        padding-bottom: 8px;
        gap: 8px;
        scrollbar-width: none;
        -ms-overflow-style: none;
        margin-bottom: 14px;
        -webkit-mask-image: linear-gradient(to right, black 80%, transparent 100%);
        mask-image: linear-gradient(to right, black 80%, transparent 100%);
      }

      .filter-bar::-webkit-scrollbar { display: none; }

      .filter-btn {
        padding: 10px 15px;
        font-size: 0.9rem;
        flex-shrink: 0;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
      }

      .filter-btn:active {
        transform: scale(0.94);
        opacity: 0.85;
      }

.genre-columns {
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .radio-card {
        padding: 14px;
      }

      .radio-card:hover {
        transform: none;
      }

      .group-heading {
        flex-direction: column;
        align-items: flex-start;
      }

      .play-button {
        width: 100%;
        text-align: center;
        padding: 13px 16px;
        font-size: 1rem;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
      }

      .play-button:active:enabled {
        transform: scale(0.97);
        opacity: 0.88;
      }

      .seo-blocks { margin: 20px 0 8px; }
    }
  </style>
</head>

          { genre: "chill",     label: "🌿 Chill" },
          { genre: "pop",       label: "🎶 Pop" },
          { genre: "study",     label: "💻 Study" },
          { genre: "electro",   label: "⚡ Electronic" },
          { genre: "psy",       label: "🔀 Psytrance" },
          { genre: "synthwave", label: "🌆 Synthwave" }
        ],
        genreNames: {
          rock:      "🎸 Rock / Alternative",
          jazz:      "🎷 Jazz",
          chill:     "🌿 Chill / Ambient",
          pop:       "🎶 Pop",
          study:     "💻 Study / Lo-Fi",
          electro:   "⚡ Electronic / Dance",
          psy:       "🔀 Goa / Psytrance",
          synthwave: "🌆 Synthwave / Retrowave"
        },
        seo: [
          {
            h2: "A different online radio experience",
            p:  `Pulsar FM is not just another radio list. It's a full experience combining <strong>live radio</strong> with the nostalgic charm of Winamp and its legendary psychedelic visuals.`
          },
          {
            h2: "For those who miss Winamp",
            p:  "If you used Winamp in the past, you know the feeling. Pulsar FM brings it back, directly in the browser — no installation needed."
          },
          {
            h2: "Explore online radio by genre",
            p:  "Pick the right vibe for any moment — rock, jazz, chill, electronic or psytrance.",
            links: [
              { genre: "rock",      label: "Rock Radios" },
              { genre: "jazz",      label: "Jazz Radios" },
              { genre: "chill",     label: "Chill Radios" },
              { genre: "study",     label: "Study Radios" },
              { genre: "electro",   label: "Electronic Radios" },
              { genre: "psy",       label: "Psytrance Radios" },
              { genre: "synthwave", label: "Synthwave Radios" }
            ]
          }
        ],
        footer1: `Visualizer based on <a href="https://github.com/jberg/butterchurn" target="_blank">Butterchurn</a> · Player based on <a href="https://github.com/captbaritone/webamp" target="_blank">Webamp</a>`,
        footer2: `Creator of Pulsar FM — <em>a retro online radio experience inspired by neon nights, Winamp skins, loud memories and the golden age of internet weirdness.</em> · <a href="https://ko-fi.com/pfm80" target="_blank" style="opacity:0.6;">☕ Ko-fi</a>`
      }
    };

    let currentLang = localStorage.getItem("pulsarfm-lang") || "pt";

    const filterButtons = document.getElementById("filter-buttons");
    const radioGroups   = document.getElementById("radio-groups");

    let webampInstance = null;
    let playerReady    = false;
    let activeGenre    = "all";
    let playingUrl     = null;

    function renderFilters() {
      const t = translations[currentLang];
      filterButtons.innerHTML = "";
      t.filters.forEach(({ genre, label }) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "filter-btn";
        button.dataset.genre = genre;
        button.textContent = label;
        button.setAttribute("aria-pressed", String(genre === activeGenre));
        if (genre === activeGenre) button.classList.add("active");
        filterButtons.appendChild(button);
      });
    }

    function createStationCard(name, url) {
      const t      = translations[currentLang];
      const card   = document.createElement("article");
      card.className = "radio-card";
      const title  = document.createElement("h3");
      title.textContent = name;
      const button = document.createElement("button");
      button.type = "button";
      button.className = "play-button";
      button.dataset.url  = url;
      button.dataset.name = name;
      button.disabled     = !playerReady;
      button.textContent  = playerReady ? t.playBtn : t.loadingBtn;
      card.append(title, button);
      return card;
    }

    function renderStations() {
      const t = translations[currentLang];
      radioGroups.innerHTML = "";
      Object.entries(radios).forEach(([genre, stations]) => {
        const group   = document.createElement("section");
        group.className = "radio-group";
        group.dataset.genre = genre;

        const heading = document.createElement("div");
        heading.className = "group-heading";

        const title = document.createElement("h2");
        title.textContent = t.genreNames[genre];

        const list = document.createElement("div");
        list.className = "station-list";
        stations.forEach(([name, url]) => list.appendChild(createStationCard(name, url)));

        heading.append(title);
        group.append(heading, list);
        radioGroups.appendChild(group);
      });
    }

function updatePlayerButtons() {
      const t = translations[currentLang];
      document.querySelectorAll(".play-button").forEach(btn => {
        btn.disabled    = !playerReady;
        btn.textContent = playerReady ? t.playBtn : t.loadingBtn;
      });
    }

    function renderSeoBlocks() {
      const t = translations[currentLang];
      const seoBlocks = document.getElementById("seo-blocks");
      seoBlocks.innerHTML = t.seo.map(card => {
        const links = card.links
          ? `<div class="genre-links">${card.links.map(l =>
              `<a href="#radio-groups" class="genre-filter-link" data-genre="${l.genre}">${l.label}</a>`
            ).join("")}</div>`
          : "";
        return `<article class="seo-card"><h2>${card.h2}</h2><p>${card.p}</p>${links}</article>`;
      }).join("");
    }

    function applyLanguage(lang) {
      currentLang = lang;
      localStorage.setItem("pulsarfm-lang", lang);
      const t = translations[lang];
      document.getElementById("hero-h1").textContent    = t.h1;
      document.getElementById("hero-intro").textContent = t.intro;
      document.getElementById("lang-switcher").textContent = t.langBtn;
      document.getElementById("footer-line1").innerHTML = t.footer1;
      document.getElementById("footer-line2").innerHTML = t.footer2;
      renderFilters();
      updateFilterState();
      renderStations();
      updatePlayerButtons();
      setPlayingCard(playingUrl);
      renderSeoBlocks();
    }

    function updateFilterState() {
      document.querySelectorAll(".radio-group").forEach(group => {
        group.hidden = activeGenre !== "all" && group.dataset.genre !== activeGenre;
      });
      document.querySelectorAll(".filter-btn").forEach(btn => {
        const isActive = btn.dataset.genre === activeGenre;
        btn.classList.toggle("active", isActive);
        btn.setAttribute("aria-pressed", String(isActive));
      });
    }

    function filterRadios(genre) {
      activeGenre = (genre === "all" || Object.prototype.hasOwnProperty.call(translations[currentLang].genreNames, genre)) ? genre : "all";
      updateFilterState();
    }

    function playRandom() {
      const all = Object.entries(radios).flatMap(([, stations]) => stations);
      const [name, url] = all[Math.floor(Math.random() * all.length)];
      playStation(url, name);
    }

    function setPlayingCard(url) {
      playingUrl = url;
      document.querySelectorAll(".radio-card").forEach(card => {
        const btn = card.querySelector(".play-button");
        card.classList.toggle("playing", btn && btn.dataset.url === url);
      });
    }

    function playStation(url, name) {
      if (!playerReady || !webampInstance) return;
      webampInstance.setTracksToPlay([{ url, metaData: { artist: name, title: "Ao vivo" } }]);
      setPlayingCard(url);
    }

    filterButtons.addEventListener("click", event => {
      const button = event.target.closest("button[data-genre]");
      if (!button) return;
      filterRadios(button.dataset.genre);
      button.scrollIntoView({ behavior: "smooth", block: "nearest", inline: "center" });
      if (window.innerWidth < 820) {
        setTimeout(() => radioGroups.scrollIntoView({ behavior: "smooth", block: "start" }), 120);
      }
    });

    document.addEventListener("click", event => {
      const link = event.target.closest(".genre-filter-link[data-genre]");
      if (!link) return;
      event.preventDefault();
      filterRadios(link.dataset.genre);
      radioGroups.scrollIntoView({ behavior: "smooth", block: "start" });
    });

    radioGroups.addEventListener("click", event => {
      const button = event.target.closest("button[data-url]");
      if (button) playStation(button.dataset.url, button.dataset.name);
    });

    const scanBtn = document.getElementById("scan-btn");
    scanBtn.disabled = true;

    applyLanguage(currentLang);

    document.getElementById("lang-switcher").addEventListener("click", () => {
      applyLanguage(currentLang === "pt" ? "en" : "pt");
    });

    scanBtn.addEventListener("click", playRandom);

    const isMobile = window.innerWidth < 600;

    const webamp = new Webamp({
      initialTracks: [],
      enableMediaSession: true,
      enableHotkeys: true,
      __butterchurnOptions: {
        importButterchurn: () => Promise.resolve(window.butterchurn),
        getPresets: () => {
          const presets = window.butterchurnPresets.getPresets();
          return Object.keys(presets).map(name => ({ name, butterchurnPresetObject: presets[name] }));
        },
        butterchurnOpen: true
      },
      windowLayout: isMobile ? {
        main:      { position: { top: 0,   left: 0 } },
        equalizer: { position: { top: 116, left: 0 }, closed: true },
        playlist:  { position: { top: 116, left: 0 }, closed: true },
        milkdrop:  { position: { top: 116, left: 0 }, size: { extraHeight: 6, extraWidth: 0 } }
      } : {
        main:      { position: { top: 0,   left: 0   } },
        equalizer: { position: { top: 116, left: 0   } },
        playlist:  { position: { top: 232, left: 0   }, size: { extraWidth: 0, extraHeight: 4  } },
        milkdrop:  { position: { top: 0,   left: 275 }, size: { extraHeight: 12, extraWidth: 7 } }
      }
    });

    webamp.renderWhenReady(document.getElementById("winamp"))
      .then(() => {
        webampInstance = webamp;
        playerReady    = true;
        scanBtn.disabled = false;
        updatePlayerButtons();

        webamp.onTrackDidChange(track => {
          setPlayingCard(track ? track.url : null);
        });

        webamp.onClose(() => {
          setTimeout(() => webamp.reopen(), 300);
        });
      })
      .catch(() => {});
  </script>
</body>
</html>
